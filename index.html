<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #98FB98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 5px;
            width: 200px;
            margin-right: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        h3 {
            margin-top: 20px;
            color: #333;
        }
</style>
<body>
    <h1>Weather App</h1>
    <input type="text" placeholder="Enter city name">
    <button>Get Weather</button>
    <h3></h3>
</body>
<script>
    let input = document.querySelector("input")
    let btn = document.querySelector("button")
    let text = document.querySelector("h3")

    //https://api.openweathermap.org/data/2.5/weather?q=peshawar&appid=560dc8bfa2794a7872a2c953177e7dd9
    btn.addEventListener("click" , ()=>{
        let cityName = input.value
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=560dc8bfa2794a7872a2c953177e7dd9&units=metric`)
    .then(response => response.json())
    .then(data => {
        text.textContent = `Current Temp of  ${cityName} is ${data.main.temp}`
    })
    })

    

</script>
</html>
